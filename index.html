<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris 3D Mood Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background: linear-gradient(135deg, #0f0f1a, #1e1e2f);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* Top Bar Configuration */
        #header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 340px;
            margin-bottom: 10px;
            padding: 0 5px;
        }
        h1 {
            font-size: 20px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.4);
        }
        #exit-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255,0,85,0.3);
        }

        #score-board {
            font-size: 18px;
            background: rgba(255,255,255,0.08);
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
            color: #ffcc00;
            font-weight: bold;
        }

        /* Tetris Board styling with 3D shadow effect */
        #game-board-wrapper {
            perspective: 500px;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 28px);
            grid-template-rows: repeat(20, 28px);
            gap: 2px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px;
            border-radius: 10px;
            border: 2px solid #333;
            transform: rotateX(10deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }
        .cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 3px;
        }

        /* Neon 3D Block designs */
        .filled {
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.4), 
                        inset 3px 3px 5px rgba(255,255,255,0.4);
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* Mobile Controller Buttons (Touches) */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 60px);
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .ctrl-btn:active {
            background: #00ffcc;
            color: #000;
            transform: scale(0.95);
        }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="header-container">
        <h1>TETRIS GAME</h1>
        <button id="exit-btn" onclick="exitGame()">EXIT</button>
    </div>

    <div id="score-board">Makiya: <span id="score">0</span></div>

    <div id="game-board-wrapper">
        <div id="game-board"></div>
    </div>

    <!-- Maballan Taba Allon Waya (Touches) -->
    <div id="controls">
        <button class="ctrl-btn" id="btn-up" onclick="rotatePiece()">↻</button>
        <button class="ctrl-btn" id="btn-left" onclick="moveLeft()">←</button>
        <button class="ctrl-btn" id="btn-down" onclick="moveDown()">↓</button>
        <button class="ctrl-btn" id="btn-right" onclick="moveRight()">→</button>
    </div>

    <script>
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const boardElement = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        
        let score = 0;
        let board = Array(BOARD_HEIGHT).fill(null).map(() => Array(BOARD_WIDTH).fill(0));

        // Siffofin kaloli da tubalan Tetris
        const SHAPES = [
            [[1, 1, 1, 1]], // I-Block
            [[1, 1, 1], [0, 1, 0]], // T-Block
            [[1, 1, 1], [1, 0, 0]], // L-Block
            [[1, 1], [1, 1]], // O-Block
            [[1, 1, 0], [0, 1, 1]]  // Z-Block
        ];
        const COLORS = ['#00ffcc', '#ffcc00', '#ff0055', '#9900ff', '#ff7700'];

        let currentShape, currentColor, currentX, currentY;

        // Fara gina filin wasa
        function initBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < BOARD_HEIGHT; r++) {
                for (let c = 0; c < BOARD_WIDTH; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = `r-${r}-c-${c}`;
                    boardElement.appendChild(cell);
                }
            }
        }

        // Fito da sabon tubali
        function spawnPiece() {
            const index = Math.floor(Math.random() * SHAPES.length);
            currentShape = SHAPES[index];
            currentColor = COLORS[index];
            currentX = Math.floor((BOARD_WIDTH - currentShape[0].length) / 2);
            currentY = 0;

            if (!canMove(currentX, currentY, currentShape)) {
                alert("Wasan ya ƙare! (Game Over)");
                board = Array(BOARD_HEIGHT).fill(null).map(() => Array(BOARD_WIDTH).fill(0));
                score = 0;
                scoreElement.innerText = score;
            }
        }

        function draw() {
            // Wanke allo
            for (let r = 0; r < BOARD_HEIGHT; r++) {
                for (let c = 0; c < BOARD_WIDTH; c++) {
                    const cell = document.getElementById(`r-${r}-c-${c}`);
                    cell.className = 'cell';
                    cell.style.backgroundColor = board[r][c] || '';
                    if (board[r][c]) cell.classList.add('filled');
                }
            }
            // Zana tubali mai tafiya yanzu
            for (let r = 0; r < currentShape.length; r++) {
                for (let c = 0; c < currentShape[r].length; c++) {
                    if (currentShape[r][c]) {
                        const cell = document.getElementById(`r-${currentY + r}-c-${currentX + c}`);
                        if (cell) {
                            cell.style.backgroundColor = currentColor;
                            cell.classList.add('filled');
                        }
                    }
                }
            }
        }

        function canMove(nextX, nextY, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        let x = nextX + c;
                        let y = nextY + r;
                        if (x < 0 || x >= BOARD_WIDTH || y >= BOARD_HEIGHT) return false;
                        if (y >= 0 && board[y][x]) return false;
                    }
                }
            }
            return true;
        }

        function lockPiece() {
            for (let r = 0; r < currentShape.length; r++) {
                for (let c = 0; c < currentShape[r].length; c++) {
                    if (currentShape[r][c]) {
                        if (currentY + r >= 0) {
                            board[currentY + r][currentX + c] = currentColor;
                        }
                    }
                }
            }
            clearLines();
            spawnPiece();
        }

        function clearLines() {
            for (let r = BOARD_HEIGHT - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    score += 100;
                    scoreElement.innerText = score;
                    r++; 
                }
            }
        }

        // Ayyukan Maballan Taba Allon Waya (Controller Actions)
        function moveLeft() { if (canMove(currentX - 1, currentY, currentShape)) { currentX--; draw(); } }
        function moveRight() { if (canMove(currentX + 1, currentY, currentShape)) { currentX++; draw(); } }
        function moveDown() {
            if (canMove(currentX, currentY + 1, currentShape)) {
                currentY++;
            } else {
                lockPiece();
            }
            draw();
        }

        // Juyawa (Rotations)
        function rotatePiece() {
            const kicked = [];
            for (let r = 0; r < currentShape[0].length; r++) {
                kicked.push([]);
                for (let c = currentShape.length - 1; c >= 0; c--) {
                    kicked[r].push(currentShape[c][r]);
                }
            }
            if (canMove(currentX, currentY, kicked)) {
                currentShape = kicked;
                draw();
            }
        }

        // Maballin Exit (Exit Button Function)
        function exitGame() {
            if (confirm("Kana son fita daga wasan?")) {
                window.location.href = "about:blank"; // Zai rufe ko ya fita daga shafin
            }
        }

        // Sanya wasan tafiya da kansa kowane sakan 1
        setInterval(moveDown, 1000);

        // Fara komai
        initBoard();
        spawnPiece();
        draw();
    </script>
</body>
    </html>
